name: Publish NuGet Package

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  # Step 1: Validate tag format and extract version
  validate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract-version.outputs.version }}
      tag: ${{ steps.extract-version.outputs.tag }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Validate tag format
      run: |
        TAG_NAME=${GITHUB_REF#refs/tags/}
        if [[ ! "$TAG_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "Error: Tag '$TAG_NAME' does not follow semantic versioning format (v{major}.{minor}.{patch})"
          exit 1
        fi
        echo "Tag format validated: $TAG_NAME"

    - name: Extract version from tag
      id: extract-version
      run: |
        TAG_NAME=${GITHUB_REF#refs/tags/}
        VERSION=${GITHUB_REF#refs/tags/v}
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT
        echo "Extracted version: $VERSION"

  # Step 2: Run tests
  test:
    runs-on: ubuntu-latest
    needs: validate

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          9.x
          10.x

    - name: Restore dependencies
      run: dotnet restore CleanUtils.Serilog.Enricher.FileContext.sln

    - name: Build solution
      run: dotnet build CleanUtils.Serilog.Enricher.FileContext.sln --configuration Release --no-restore

    - name: Run tests
      run: dotnet test CleanUtils.Serilog.Enricher.FileContext.Tests/CleanUtils.Serilog.Enricher.FileContext.Tests.csproj --no-build --configuration Release --verbosity normal

  # Step 3: Update package version in release branch
  update-version:
    runs-on: ubuntu-latest
    needs: [validate, test]

    steps:
    - name: Check secrets
      run: |
        if [ -z "${{ secrets.REPOSITORY_TOKEN }}" ]; then
          echo "Error: REPOSITORY_TOKEN secret is not set."
          exit 1
        else
          echo "REPOSITORY_TOKEN is set."
        fi

        if [ -z "${{ secrets.NUGET_API_KEY }}" ]; then
          echo "Error: NUGET_API_KEY secret is not set."
          exit 1
        else
          echo "NUGET_API_KEY is set."
        fi

    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.REPOSITORY_TOKEN }}
        fetch-depth: 0

    - name: Create release branch
      run: |
        git checkout -b release/${{ needs.validate.outputs.tag }}

    - name: Update package version
      run: |
        VERSION=${{ needs.validate.outputs.version }}
        sed -i "s/<Version>.*<\/Version>/<Version>$VERSION<\/Version>/" CleanUtils.Serilog.Enricher.FileContext/CleanUtils.Serilog.Enricher.FileContext.csproj
        echo "Updated package version to $VERSION"

    - name: Commit version updates
      run: |
        VERSION=${{ needs.validate.outputs.version }}
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add CleanUtils.Serilog.Enricher.FileContext/CleanUtils.Serilog.Enricher.FileContext.csproj

        if ! git diff --cached --quiet; then
          git commit -m "chore: update package version to $VERSION"
        else
          echo "No changes to commit"
        fi

    - name: Push release branch
      run: |
        git push -f origin HEAD:refs/heads/release/${{ needs.validate.outputs.tag }}

  # Step 4: Build and package
  build-and-pack:
    runs-on: ubuntu-latest
    needs: [validate, update-version]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        ref: release/${{ needs.validate.outputs.tag }}

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          9.x
          10.x

    - name: Restore dependencies
      run: dotnet restore CleanUtils.Serilog.Enricher.FileContext/CleanUtils.Serilog.Enricher.FileContext.csproj

    - name: Build project
      run: dotnet build CleanUtils.Serilog.Enricher.FileContext/CleanUtils.Serilog.Enricher.FileContext.csproj --configuration Release --no-restore

    - name: Pack NuGet package
      run: |
        mkdir -p ./nupkg
        dotnet pack CleanUtils.Serilog.Enricher.FileContext/CleanUtils.Serilog.Enricher.FileContext.csproj --configuration Release --no-build --output ./nupkg

    - name: Upload package as artifact
      uses: actions/upload-artifact@v4
      with:
        name: nuget-package
        path: ./nupkg/*.nupkg

  # Step 5: Publish to NuGet
  publish:
    runs-on: ubuntu-latest
    needs: [validate, build-and-pack]

    steps:
    - name: Download package artifact
      uses: actions/download-artifact@v4
      with:
        name: nuget-package
        path: ./nupkg

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.x'

    - name: Publish package to NuGet
      env:
        NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
      run: |
        dotnet nuget push ./nupkg/*.nupkg --source https://api.nuget.org/v3/index.json --api-key $NUGET_API_KEY --skip-duplicate

  # Step 6: Create GitHub Release
  create-release:
    runs-on: ubuntu-latest
    needs: [validate, publish]

    steps:
    - name: Create GitHub Release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.REPOSITORY_TOKEN }}
      with:
        tag_name: ${{ needs.validate.outputs.tag }}
        release_name: Release ${{ needs.validate.outputs.tag }}
        body: |
          ## CleanUtils.Serilog.Enricher.FileContext ${{ needs.validate.outputs.version }}

          ### Package
          - CleanUtils.Serilog.Enricher.FileContext v${{ needs.validate.outputs.version }}

          The package has been published to NuGet.org and is available for download.

          ### Installation
          ```bash
          dotnet add package CleanUtils.Serilog.Enricher.FileContext --version ${{ needs.validate.outputs.version }}
          ```
        draft: false
        prerelease: false

  # Step 7: Merge release branch to master and cleanup
  merge-and-cleanup:
    runs-on: ubuntu-latest
    needs: [validate, create-release]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.REPOSITORY_TOKEN }}
        fetch-depth: 0

    - name: Merge release branch to master
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"

        git fetch origin
        git checkout master
        git pull origin master

        git merge origin/release/${{ needs.validate.outputs.tag }} --no-ff -m "chore: merge release/${{ needs.validate.outputs.tag }} into master"

        git push origin master

    - name: Delete release branch
      run: |
        git push origin --delete release/${{ needs.validate.outputs.tag }}
        echo "Deleted release branch: release/${{ needs.validate.outputs.tag }}"
